<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CollabBoard</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="auth-screen" id="authScreen">
      <div class="auth-container">
        <div class="auth-card">
          <div class="auth-intro">
            <h1>✨ CollabBoard</h1>
            <p>Create projects, assign tasks, and keep your team moving in one place.</p>
          </div>
          <div class="auth-tabs">
            <button class="tab active" data-view="login">Login</button>
            <button class="tab" data-view="register">Register</button>
          </div>
          <form id="loginForm" class="auth-form active">
            <input type="email" id="loginEmail" placeholder="📧 Email" required />
            <input type="password" id="loginPassword" placeholder="🔐 Password" required />
            <button type="submit">Sign In</button>
          </form>
          <form id="registerForm" class="auth-form">
            <input type="text" id="registerName" placeholder="👤 Full name" required />
            <input type="email" id="registerEmail" placeholder="📧 Email" required />
            <input type="password" id="registerPassword" placeholder="🔐 Password" required />
            <button type="submit">Create Account</button>
          </form>
        </div>
      </div>
    </div>

    <div class="app-shell" id="appShell" hidden>
      <header class="topbar">
        <div>
          <h2>CollabBoard</h2>
          <p>Team collaboration workspace</p>
        </div>
        <div class="topbar-actions">
          <span id="userLabel">Loading...</span>
          <button id="logoutBtn">Logout</button>
        </div>
      </header>

      <main class="workspace-grid">
        <aside class="sidebar">
          <section class="panel">
            <h3>Create Project</h3>
            <form id="projectForm">
              <input type="text" id="projectName" placeholder="Project name" required />
              <textarea id="projectDescription" placeholder="Project description"></textarea>
              <button type="submit">Add Project</button>
            </form>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h3>Your Projects</h3>
            </div>
            <div id="projectList" class="project-list"></div>
          </section>

          <section class="panel">
            <div class="panel-header">
              <h3>Notifications</h3>
              <button id="markReadBtn" class="ghost">Mark all read</button>
            </div>
            <div id="notificationList" class="notification-list"></div>
          </section>
        </aside>

        <section class="main-panel">
          <section class="panel project-empty" id="projectEmpty">
            <h3>Select a project to view its board</h3>
          </section>

          <section id="projectBoardSection" hidden>
            <div class="panel project-header">
              <div>
                <h3 id="projectTitle">Project</h3>
                <p id="projectSubtitle"></p>
              </div>
              <form id="taskForm" class="task-form">
                <input type="text" id="taskTitle" placeholder="Task title" required />
                <textarea id="taskDescription" placeholder="Task description"></textarea>
                <select id="taskAssignee"></select>
                <select id="taskStatus">
                  <option value="todo">To Do</option>
                  <option value="inprogress">In Progress</option>
                  <option value="done">Done</option>
                </select>
                <select id="taskPriority">
                  <option value="low">Low</option>
                  <option value="medium">Medium</option>
                  <option value="high">High</option>
                </select>
                <input type="date" id="taskDueDate" />
                <button type="submit">Add Task</button>
              </form>
            </div>

            <div class="board-grid" id="boardGrid"></div>
          </section>
        </section>

        <aside class="detail-panel">
          <section class="panel">
            <h3>Task Details</h3>
            <div id="taskDetail" class="task-detail">
              <p>Select a task to inspect comments and update it.</p>
            </div>
          </section>
        </aside>
      </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="js/app.js"></script>
  </body>
</html>
